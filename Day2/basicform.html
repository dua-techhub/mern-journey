<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basci Form</title>
  </head>
  <body>
    <form>
      <h1>Event Registration Form</h1>
      <label for="name">Name:</label>
      <br />
      <input type="text" name="name" id="name" />
      <br />
      <label for="email">Email:</label>
      <br />
      <input type="email" name="email" id="email" />
      <br />
      <label for="tel">Phome:</label>
      <br />
      <input type="tel" name="phone" id="phome" />
      <br />
      <label for="occupation">Occupation</label>
      <br /><br />
      <select name="occ" id="occupation">
        <option>cs</option>
        <option>se</option>
        <option>La</option>
      </select>
      <br>
       <br>
       <label for="">Topics of interest</label>
      <input type="checkbox" value="html" id="checkbox1" />
      <label for="checkbox1">html</label>
      <input type="checkbox" value="css" id="checkbox2"  />
      <label for="checkbox2">css</label>
      <input type="checkbox" value="js"  id="checkbox3"/>
      <label for="checkbox3">js</label>
<br>
 <input type="number" name="counter" id="counter" min="0" max="100">
<br><br>
      <label for="text">Comments</label>
      <br><br>
      <textarea name="comments" id="text"></textarea>
      <br><br>
<input type="button" value="Register">
    </form>
  </body>
</html>

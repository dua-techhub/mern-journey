<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML Dummy Form</title>
</head>

<body>

<form>

  <fieldset>
    <legend>HTML Dummy Form</legend>

    <!-- Name -->
    <label for="name">Name</label>
    <input type="text" id="name" name="username" placeholder="Enter user name">
    <br><br>

    <!-- Password -->
    <label for="pass">Password</label>
    <input type="password" id="pass" name="password" placeholder="Enter password">
    <br><br>

    <!-- Email -->
    <label for="email">Email</label>
    <input type="email" id="email" name="email" placeholder="Enter email">
    <br><br>

    <!-- Date -->
    <label for="date">Choose Date</label>
    <input type="date" id="date" name="date">
    <br><br>

    <!-- Gender -->
    <label>Select Gender</label>
    <br><br>

    <input type="radio" id="male" name="gender" value="male">
    <label for="male">Male</label>
    <br><br>

    <input type="radio" id="female" name="gender" value="female">
    <label for="female">Female</label>
    <br><br>

    <input type="radio" id="notSay" name="gender" value="notSay">
    <label for="notSay">Prefer Not To Say</label>
    <br><br>

    <!-- Select Dish -->
    <label for="dish">Choose your dish</label>
    <select id="dish" name="dish">
      <option value="maggi">Maggi</option>
      <option value="chips">Chips</option>
      <option value="kurkure">Kurkure</option>
    </select>
    <br><br>

    <!-- Checkbox -->
  
    <input type="checkbox" id="subscribe1" name="subscribe">
    <label for="subscribe1">CS</label>
    <br><br>
    <input type="checkbox" id="subscribe" name="subscribe">
    <label for="subscribe">SE</label>
    <br><br>

    <!-- Textarea -->
    <label for="ta">Enter Text</label>
    <br>
    <textarea id="ta" name="message" placeholder="Enter text here"></textarea>
    <br><br>

    <!-- File Upload -->
    <label for="file1">Browse File</label>
    <input type="file" id="file1" name="file">
    <br><br>

    <!-- Image Button -->
    <input type="image" src="a2.jpg" alt="Submit Image" width="40">

    <br><br>

    <!-- Submit Button -->
    <input type="submit" value="Submit Form">

  </fieldset>

</form>

</body>
</html>
